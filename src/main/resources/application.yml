# =====================================================================
# Java 后端快速开发脚手架配置文件
# =====================================================================

spring:
  application:
    name: java-backend-basic

  # ========================== 数据源 ==========================
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:java_backend_basic}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: ${DRUID_PASSWORD:admin123}
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

  # ========================== Redis ==========================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

# ========================== MyBatis-Plus ==========================
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.basic.model.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ========================== JWT ==========================
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-env}
  expiration: ${JWT_EXPIRATION:604800000}
  token-prefix: Bearer
  header-name: Authorization

# ========================== 文件上传 ==========================
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  max-file-size: 10MB
  max-request-size: 50MB

# ========================== Coze 工作流配置 ==========================
coze:
  base-url: ${COZE_BASE_URL:https://api.coze.cn}
  api-token: ${COZE_API_TOKEN:}
  bot-id: ${COZE_BOT_ID:}
  workflow-id: ${COZE_WORKFLOW_ID:}
  poll-interval: ${COZE_POLL_INTERVAL:2}
  poll-timeout: ${COZE_POLL_TIMEOUT:60}
  enabled: ${COZE_ENABLED:true}

# ========================== 通知服务配置 ==========================
notification:
  dingtalk:
    enabled: ${DINGTALK_ENABLED:false}
    webhook-url: ${DINGTALK_WEBHOOK_URL:}
  serverchan:
    enabled: ${SERVERCHAN_ENABLED:false}
    sendkey: ${SERVERCHAN_SENDKEY:}
  feishu:
    enabled: ${FEISHU_ENABLED:false}
    webhook-url: ${FEISHU_WEBHOOK_URL:}
  wecom:
    enabled: ${WECOM_ENABLED:false}
    webhook-url: ${WECOM_WEBHOOK_URL:}
  mail:
    enabled: ${MAIL_ENABLED:false}
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:}

# ========================== 服务端口 ==========================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# ========================== Actuator ==========================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# ========================== 日志 ==========================
logging:
  level:
    root: INFO
    com.example.basic: DEBUG

# ========================== SpringDoc ==========================
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
